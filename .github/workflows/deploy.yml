name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute SSH commands on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            set -euxo pipefail

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20

            command -v pm2 >/dev/null 2>&1 || npm i -g pm2

            cd /home/ubuntu/Pr_times_hackathon/webapp/nextjs
            git pull origin main

            npm ci
            npm run build
            
            # 起動/再起動 (npx pm2 で統一)
            npx pm2 restart nextjs-app --update-env || npx pm2 start npm --name "nextjs-app" -- start --update-env
            
            # PM2の現在の状態を保存 (EC2再起動時に自動復帰するため)
            npx pm2 save