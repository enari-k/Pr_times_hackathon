name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute SSH commands on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # nvm
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # Nodeを固定（推奨：20）
            nvm install 20
            nvm use 20

            # env（pm2起動前に設定）
            export AWS_REGION="ap-southeast-2"
            export S3_BUCKET="${{ secrets.S3_BUCKET }}"

            cd /home/ubuntu/Pr_times_hackathon/webapp/nextjs
            git pull origin main

            npm ci
            npm run build

            # standalone起動（next startではなく）
            pm2 restart nextjs-app --update-env || pm2 start "node .next/standalone/server.js" --name "nextjs-app" --update-env

            pm2 save